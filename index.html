<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>پروفایل من | شبکه‌های اجتماعی</title>
  <!-- Font Awesome 6 (Free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font: Vazir (modern Iranian font) -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(145deg, #0b0f18 0%, #1a1f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e9edf5;
    }

    .profile-card {
      max-width: 420px;
      width: 100%;
      background: rgba(20, 25, 38, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 48px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(120, 160, 255, 0.15) inset;
      transition: transform 0.25s ease;
    }

    .profile-card:hover {
      transform: translateY(-5px);
    }

    /* avatar & info */
    .avatar-frame {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(220, 240, 255, 0.25);
      box-shadow: 0 15px 30px -10px #0a0e1a, 0 0 0 2px #2e3b4e inset;
      background: #2c3447;
      padding: 4px;
      background: linear-gradient(135deg, #3e4a62, #202636);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #10141e;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.5px;
      background: linear-gradient(to left, #fff, #c0d0f0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
      line-height: 1.3;
    }

    .bio {
      text-align: center;
      font-weight: 400;
      font-size: 16px;
      color: #a8b8d9;
      margin: 8px 0 18px;
      padding: 0 6px;
      border-bottom: 1px dashed #2e3a4e;
      padding-bottom: 20px;
    }

    /* social links grid */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 24px 0 18px;
    }

    .social-item {
      list-style: none;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(12, 18, 28, 0.65);
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      text-decoration: none;
      color: #eef4ff;
      font-weight: 500;
      font-size: 18px;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px -8px #010101;
      border-left: 3px solid transparent;
    }

    .social-link:hover {
      background: rgba(30, 40, 60, 0.85);
      border-color: rgba(255, 255, 255, 0.15);
      border-left-width: 6px;
      padding-right: 24px;
      transform: scale(1.01);
    }

    .social-link i {
      font-size: 28px;
      width: 36px;
      text-align: center;
      filter: drop-shadow(0 0 5px rgba(200, 220, 255, 0.3));
    }

    .link-text {
      flex: 1;
      margin-right: 16px;
      text-align: right;
      letter-spacing: 0.2px;
    }

    .arrow-icon {
      font-size: 18px;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }

    .social-link:hover .arrow-icon {
      opacity: 1;
      transform: translateX(-4px);
      color: #fff;
    }

    /* brand colors (soft modern) */
    .instagram i { color: #f777cf; text-shadow: 0 0 10px #f24f9b40; }
    .telegram i { color: #2f9bdf; text-shadow: 0 0 8px #2f9bdf70; }
    .tiktok i { color: #ffffff; text-shadow: 0 0 8px #ff277050; }
    .youtube i { color: #ff4d4d; text-shadow: 0 0 10px #ff454570; }

    .instagram { border-left-color: #f5609c; }
    .telegram { border-left-color: #2a9df4; }
    .tiktok { border-left-color: #25f4ee; }
    .youtube { border-left-color: #ff0000; }

    /* extra footer */
    .footer-note {
      text-align: center;
      font-size: 13px;
      color: #5f6f8a;
      margin-top: 28px;
      border-top: 1px solid #1f293d;
      padding-top: 18px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .footer-note span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-note i {
      font-size: 14px;
      color: #5f7bbf;
    }

    /* for very small devices */
    @media (max-width: 380px) {
      .profile-card { padding: 20px 16px; }
      .name { font-size: 24px; }
      .social-link { padding: 14px 16px; font-size: 16px; }
      .social-link i { font-size: 24px; width: 30px; }
    }
  </style>
</head>
<body>

    <div class="footer-note">

</html>
